name: Test Budowania Dockera
on: [push]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod z repozytorium
        uses: actions/checkout@v4

      - name: Zbuduj obraz Docker
        run: docker build -t moj-testowy-skrypt .

      - name: Uruchom kontener i sprawdz czy dziala
        run: docker run moj-testowy-skrypt